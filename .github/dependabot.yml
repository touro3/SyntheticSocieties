version: 2

updates:
  # Python production deps (Flask + ML stack).
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Vienna
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    groups:
      # Group lockstep upgrades to avoid 20 separate PRs per week.
      ml-stack:
        patterns: ["torch*", "transformers", "accelerate", "datasets", "safetensors", "tokenizers", "huggingface-hub", "sentencepiece"]
      web-stack:
        patterns: ["flask*", "gunicorn", "werkzeug", "jinja2"]
      data-stack:
        patterns: ["numpy", "scipy", "pandas", "polars", "pyarrow", "duckdb", "scikit-learn"]
      observability:
        patterns: ["rich", "structlog", "loguru", "sentry-sdk", "prometheus-*"]
      dev-tools:
        patterns: ["pytest*", "ruff", "mypy", "bandit", "pip-audit", "hypothesis", "pre-commit"]
    ignore:
      # Major PyTorch jumps tend to ripple through transformers + accelerate;
      # let them land via group PRs rather than a noisy single-package one.
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "deps"
      include: scope

  # Python CI-only deps (no torch).
  - package-ecosystem: pip
    directory: /
    target-branch: main
    schedule:
      interval: weekly
    labels: [dependencies, python, ci]
    open-pull-requests-limit: 3
    allow:
      - dependency-name: "pytest*"
      - dependency-name: "ruff"
      - dependency-name: "mypy"
      - dependency-name: "bandit"
      - dependency-name: "pip-audit"
      - dependency-name: "coverage"
      - dependency-name: "hypothesis"

  # GitHub Actions workflow upgrades (e.g. actions/checkout@v4 → v5).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, ci]
    commit-message:
      prefix: "ci"

  # Docker base-image upgrades.
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, docker]
    commit-message:
      prefix: "docker"

  # Frontend (Vue SPA under frontend/).
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    labels: [dependencies, frontend]
    open-pull-requests-limit: 5
    groups:
      vue-stack:
        patterns: ["vue", "vue-*", "@vue/*", "vite", "@vitejs/*"]
      lint-stack:
        patterns: ["eslint*", "@typescript-eslint/*", "prettier"]
    commit-message:
      prefix: "frontend"
