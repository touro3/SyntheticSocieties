name: BGF CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

# Cancel in-progress runs on new push to same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: "Python ${{ matrix.python-version }} — unit & integration tests"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Install dependencies (CPU-only, no GPU)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          # Install project in editable mode (no torch required for most modules)
          pip install -e . --no-deps

      - name: Run non-GPU tests
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_llm_policy.py \
            -k "not (llm_backend or huggingface or gpu or cuda)" \
            --tb=short \
            -q \
            --timeout=120
        env:
          # Prevent accidental LLM API calls in CI
          OPENAI_API_KEY: "sk-test-ci-placeholder"
          BGF_CI: "true"

      - name: Verify one-command baseline pipeline
        run: |
          python scripts/run_full_pipeline.py \
            --rounds 3 \
            --agents 5 \
            --seeds 42 \
            2>&1 | tail -20

      - name: Run feature importance (no GPU)
        run: |
          python scripts/run_feature_importance.py \
            --n-agents 50 \
            --n-rounds 5 \
            --seed 42

      - name: Run policy intervention sweep (no GPU)
        run: |
          python scripts/run_policy_intervention.py \
            --n-agents 50 \
            --n-rounds 10 \
            --n-seeds 2

      - name: Run long-horizon persona drift (no GPU)
        run: |
          python scripts/run_long_horizon.py \
            --n-agents 30 \
            --n-rounds 30 \
            --n-seeds 2

      - name: Upload figures artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bgf-figures-${{ github.sha }}
          path: analysis/figures/
          retention-days: 7

  lint:
    name: "Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check .
      - name: Run ruff format check
        run: ruff format --check .

  type-check:
    name: "Type check (mypy)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install mypy pydantic>=2.8 types-PyYAML numpy pandas networkx
          pip install -e . --no-deps
      - name: Run mypy
        run: mypy . --ignore-missing-imports --exclude tests/ --exclude llama.cpp/ --exclude venv/
        continue-on-error: true  # non-blocking until type annotations are complete

  coverage:
    name: "Coverage (≥70%)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ runner.os }}-${{ hashFiles('requirements-ci.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e . --no-deps
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ \
            --ignore=tests/test_llm_policy.py \
            -k "not (llm_backend or huggingface or gpu or cuda)" \
            --cov=. \
            --cov-report=xml \
            --cov-fail-under=70 \
            -q \
            --timeout=120
        env:
          OPENAI_API_KEY: "sk-test-ci-placeholder"
          BGF_CI: "true"
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
          retention-days: 7

  frontend:
    name: "Frontend build (Vue + Vite)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend deps
        run: npm --prefix frontend install
      - name: Build Vue app
        run: npm --prefix frontend run build
      - name: Verify build output
        run: test -f api/static/index.html && echo "Build OK" || (echo "Build missing index.html" && exit 1)

  docker:
    name: "Build & push Docker image to GHCR"
    runs-on: ubuntu-latest
    needs: [test, lint, coverage, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/synthetic-societies
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: "Deploy to Hugging Face Space"
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Uploads the slim build context (no experiments/ or figures binaries);
      # huggingface_hub stores the few parquet files via Xet automatically.
      # HF then rebuilds the Docker image. Secrets required (repo Settings →
      # Secrets and variables → Actions):
      #   HF_TOKEN    — a Hugging Face write token
      #   HF_SPACE_ID — "<username>/<space-name>", e.g. touro3/synthetic-societies
      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ secrets.HF_SPACE_ID }}
        run: |
          pip install "huggingface_hub>=0.25"
          python scripts/deploy_hf_space.py
