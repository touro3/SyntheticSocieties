# Placebo / semantic-isolation ablation (Phase 1, audit response).
#
# This is the BASE config for the 3-arm contrast. scripts/run_placebo_ablation.py
# applies per-arm overrides for population.source:
#
#   grounded      → population.source=empirical   (ESS-coherent personas)
#   placebo       → population.source=placebo     (scrambled-but-valid control)
#   unconditioned → population.source=synthetic   (config-default personas)
#
# Everything else (policy, network, rounds, agents, seed) is held identical
# across arms so the ONLY varying factor is the grounding signal.
project:
  name: bgf
  experiment_id: placebo_ablation
  seed: 42

simulation:
  rounds: 30
  population_size: 100

policy:
  type: llm   # overridden to "mock" by the runner in --dry-run

population:
  source: empirical   # overridden per arm by the runner

data:
  ess_interview_path: data/ESS11INTe04_1.csv
  ess_main_path: data/ESS11MD_e01_2.csv
  ess_clean_path: data/ess_clean.parquet
  distributions_path: data/empirical_distributions.json
  sample_mode: resample

llm:
  model_id: mistralai/Mistral-7B-Instruct-v0.3
  cache_dir: null
  dtype: float16
  device_map: auto
  temperature: 0.7
  max_new_tokens: 128
  memory_window: 5
  max_retries: 2
  inference_timeout: 120
  quantization: 4bit
  max_batch_size: 16

network:
  type: random
  edge_prob: 0.5
  k: 2
  rewiring_prob: 0.3

environment:
  public_signal:
    economy: stable
  prices:
    food: 1.0
  resources:
    jobs: 100.0

agent_defaults:
  min_age: 25
  max_age: 60
  base_income: 1000.0
  income_step: 100.0
  education: college
  occupation: worker
  location: italy
  political_preference: center
  risk_tolerance: 0.5
  social_class: middle
  initial_wealth: 50.0
  wealth_step: 10.0
  memory_size: 10
