# Ablation Experiment Suite
# Runs 6 ablation conditions × 3 seeds = 18 experiments
# Requires Tesla P100 GPUs (LLM inference)

base_config_path: configs/base_config.yaml

experiments:
  # ── Rich persona (control) ──
  - experiment_id: ablation_rich_persona_s42
    policy: ablated_llm
    ablation: rich_persona
    seed: 42
    network: random
    edge_prob: 0.3
  - experiment_id: ablation_rich_persona_s123
    policy: ablated_llm
    ablation: rich_persona
    seed: 123
    network: random
    edge_prob: 0.3
  - experiment_id: ablation_rich_persona_s7
    policy: ablated_llm
    ablation: rich_persona
    seed: 7
    network: random
    edge_prob: 0.3

