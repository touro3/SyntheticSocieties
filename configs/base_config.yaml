project:
  name: bgf
  experiment_id: exp_0001
  seed: 42

simulation:
  rounds: 3
  population_size: 5

policy:
  type: mock

population:
  source: empirical    # "synthetic" (v0.1 defaults) or "empirical" (ESS-grounded)

data:
  ess_interview_path: data/ESS11INTe04_1.csv
  ess_main_path: data/ESS11MD_e01_2.csv
  ess_clean_path: data/ess_clean.parquet
  distributions_path: data/empirical_distributions.json
  sample_mode: resample   # "resample" (with replacement) or "subsample"

llm:
  model_id: mistralai/Mistral-7B-Instruct-v0.3
  cache_dir: null  # uses HuggingFace default (~/.cache/huggingface)
  dtype: float16
  device_map: auto
  temperature: 0.7
  max_new_tokens: 256
  memory_window: 5
  max_retries: 2

network:
  type: random
  edge_prob: 0.5
  k: 2
  rewiring_prob: 0.3

environment:
  public_signal:
    economy: stable
  prices:
    food: 1.0
  resources:
    jobs: 100.0

agent_defaults:
  min_age: 25
  max_age: 60
  base_income: 1000.0
  income_step: 100.0
  education: college
  occupation: worker
  location: italy
  political_preference: center
  risk_tolerance: 0.5
  social_class: middle
  initial_wealth: 50.0
  wealth_step: 10.0
  memory_size: 10