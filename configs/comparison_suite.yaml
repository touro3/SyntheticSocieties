# Full Policy Comparison Suite
# Runs all key policies with 20 agents, 10 rounds, 3 seeds
# Produces the experiment data needed for comparison diagrams

base_config_path: configs/base_config.yaml

experiments:
  # ── Template (ESS archetypes) ──
  - experiment_id: cmp_template_s42
    policy: template
    seed: 42
    network: random
    edge_prob: 0.3
    population_size: 20
    rounds: 10
  - experiment_id: cmp_template_s123
    policy: template
    seed: 123
    network: random
    edge_prob: 0.3
    population_size: 20
    rounds: 10
