# Cross-cultural validation — Southern European cluster (ES, IT, PT, GR)
# Phase 17: Uses trust_people_band=moderate to approximate Southern European
# moderate-trust profile.
# ESS-11 reference mean trust: 0.463 (normalized 0-1).
# Only AT microdata in local parquet; trust band used as cluster proxy.

project:
  name: cross_cultural_southern
  seed: 42

simulation:
  rounds: 10
  population_size: 20

policy:
  type: mock

population:
  source: empirical

society_spec:
  trust_people_band: moderate
  age_profile: mixed
  urbanization: mixed
  narrative: "Southern European moderate-trust community"

network:
  type: small_world
  k: 4
  rewiring_prob: 0.1
