project:
  name: bgf_memory_ablation
  experiment_id: ablation_m3_full
  seed: 42

simulation:
  rounds: 30
  population_size: 100

policy:
  type: llm

# Memory ablation: M3 — full hierarchical memory (default BGF behaviour).
# Reflection + importance-scored recent events + persona drift anchor.
memory:
  level: 3

population:
  source: empirical

data:
  ess_clean_path: data/ess_clean.parquet

llm:
  model_id: mistralai/Mistral-7B-Instruct-v0.3
  dtype: float16
  device_map: auto
  temperature: 0.7
  max_new_tokens: 256
  memory_window: 5
  max_retries: 2
  inference_timeout: 120

network:
  type: random
  edge_prob: 0.5
  k: 2
  rewiring_prob: 0.3

environment:
  public_signal:
    economy: stable
  prices:
    food: 1.0
  resources:
    jobs: 100.0

agent_defaults:
  initial_wealth: 50.0
  risk_tolerance: 0.5
  memory_size: 10
