defaults:
- base_config
project:
  name: bgf_condition_p
  experiment_id: padded_control_s3
  seed: 3
simulation:
  rounds: 30
  population_size: 50
policy:
  type: padded_ablation
padded:
  target_token_count: null
population:
  source: empirical
llm:
  model_id: mistralai/Mistral-7B-Instruct-v0.3
  cache_dir: null
  quantization: 4bit
  dtype: float16
  device_map: auto
  temperature: 0.7
  max_new_tokens: 256
  memory_window: 5
  max_retries: 2
  inference_timeout: 120
network:
  type: random
  edge_prob: 0.5
  k: 2
  rewiring_prob: 0.3
environment:
  public_signal:
    economy: stable
  prices:
    food: 1.0
  resources:
    jobs: 100.0
agent_defaults:
  min_age: 25
  max_age: 60
  base_income: 1000.0
  income_step: 100.0
  education: college
  occupation: worker
  location: italy
  political_preference: center
  risk_tolerance: 0.5
  social_class: middle
  initial_wealth: 50.0
  wealth_step: 10.0
  memory_size: 10
