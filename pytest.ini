# Reproducibility: PYTHONHASHSEED must be 0 for deterministic dict/set
# ordering and hash()-derived values. It MUST be exported before the Python
# interpreter starts (a pytest plugin would set it too late), so run tests as:
#     PYTHONHASHSEED=0 python -m pytest
# reproduce_paper.sh and launch_audit_gpu_experiments.sh already export it.
[pytest]
testpaths = tests
python_files = test_*.py
addopts = -q --cov=bgf --cov-report=term-missing --cov-report=html
markers =
    notebook: tests that execute the demo notebook end-to-end
filterwarnings =
    ignore::UserWarning:simulation.kernel


