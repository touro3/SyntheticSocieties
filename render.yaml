services:
  - type: web
    name: synthetic-societies-api
    runtime: python
    repo: https://github.com/touro3/SyntheticSocieties
    branch: main
    plan: free
    buildCommand: >-
      pip install -r requirements-api.txt && pip install -e . --no-deps &&
      npm --prefix frontend install &&
      npm --prefix frontend run build
    startCommand: mkdir -p experiments tracker data/human && gunicorn 'api.app:create_app()' --bind 0.0.0.0:$PORT --workers 1 --worker-class gthread --threads 8 --timeout 120 --preload
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: NODE_VERSION
        value: "20.20.2"

      # ── AI design + simulation agent keys (set in Render dashboard) ──────────
      - key: GROQ_API_KEY
        sync: false   # free, fast — powers AI Simulation Design and agent LLM
      - key: OPENAI_API_KEY
        sync: false   # optional — GPT-4o design + /report endpoint

      # ── Auth token (leave unset for open/demo mode) ───────────────────────
      - key: BGF_API_TOKEN
        sync: false

      # ── CORS (comma-separated origins; leave unset for open/demo mode) ───────
      - key: BGF_CORS_ORIGINS
        sync: false

      # NOTE: Ollama is NOT available on Render free tier (512 MB RAM limit).
      # The /api/capabilities endpoint will return ollama:false automatically.
      # To enable Ollama on Render, upgrade to Standard plan (2 GB RAM) and
      # add a background worker that runs: ollama serve
